name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
        aws-region: us-west-2

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-west-2 | docker login --username AWS --password-stdin 585008083177.dkr.ecr.us-west-2.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t devsecops-app .

    - name: Tag image
      run: |
        docker tag devsecops-app:latest 585008083177.dkr.ecr.us-west-2.amazonaws.com/devsecops:latest

    - name: Push to ECR
      run: |
        docker push 585008083177.dkr.ecr.us-west-2.amazonaws.com/devsecops:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.HOST_NAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          docker pull 585008083177.dkr.ecr.us-west-2.amazonaws.com/devsecops:latest
          docker stop devsecops || true
          docker rm devsecops || true
          docker run -d -p 8000:8000 --name devsecops 585008083177.dkr.ecr.us-west-2.amazonaws.com/devsecops:latest
